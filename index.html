<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VAULT FN - Fortnite Cosmetics</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>
VAULT <span>FN</span>
</h1>

<input id="search" placeholder="Search cosmetics...">

</header>



<div class="toolbar">

<button data-type="all">
All
</button>

<button data-type="Outfit">
Outfits
</button>

<button data-type="Harvesting Tool">
Pickaxes
</button>

<button data-type="Back Bling">
Back Bling
</button>

<button data-type="Glider">
Gliders
</button>

<button data-type="Emote">
Emotes
</button>


<select id="sort">

<option value="oldest">
Oldest → Newest
</option>

<option value="newest">
Newest → Oldest
</option>

<option value="name">
Name A-Z
</option>

</select>


</div>


<p id="status">
Loading Fortnite cosmetics...
</p>


<div id="grid"></div>



<script src="script.js"></script>

</body>
</html>
